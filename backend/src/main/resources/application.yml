spring:
  application:
    name: mongo-admin-backend
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/admindb}

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:default-development-secret}
  access-expiration: 3600000
  refresh-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.mongoadmin: DEBUG
